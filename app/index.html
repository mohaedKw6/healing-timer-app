<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مرّ من الوقت</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, 'Noto Sans Arabic', sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.7;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* Rain */
.rain-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
.raindrop {
  position: absolute; top: -10%; width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(150,180,255,0.3), transparent);
  animation: rain-fall linear infinite;
}
@keyframes rain-fall {
  0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(110vh) translateX(-20px); opacity: 0; }
}

/* Fog */
.fog-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
}

/* BG image */
.bg-image {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; opacity: 0.06; background-size: cover; background-position: center;
  filter: grayscale(80%) blur(1px); transition: opacity 5s;
}

/* Main container */
.app-container { position: relative; z-index: 10; min-height: 100vh; }

/* Top bar */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 40;
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px;
}
.top-bar button {
  background: rgba(24,24,27,0.5); border: 1px solid rgba(39,39,42,0.3);
  color: #71717a; border-radius: 8px; padding: 8px; cursor: pointer;
  transition: all 0.3s; font-size: 14px;
}
.top-bar button:hover { color: #d4d4d8; background: rgba(24,24,27,0.7); }
.volume-slider { width: 60px; height: 4px; -webkit-appearance: none; background: #27272a; border-radius: 4px; outline: none; margin-right: 8px; }
.volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #a1a1aa; cursor: pointer; }

/* Timer */
.timer-section { padding: 60px 16px 16px; text-align: center; }
.timer-title { color: #a1a1aa; font-size: 18px; margin-bottom: 4px; }
.timer-subtitle { color: #52525b; font-size: 12px; margin-bottom: 16px; }
.timer-boxes { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
.timer-box { display: flex; flex-direction: column; align-items: center; }
.timer-value {
  width: 56px; height: 64px; background: rgba(0,0,0,0.6);
  border: 1px solid #27272a; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: bold; font-family: 'Courier New', monospace;
  position: relative; overflow: hidden;
}
.timer-value::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%;
  background: linear-gradient(to bottom, rgba(39,39,42,0.2), transparent);
}
.timer-value span { position: relative; z-index: 1; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
.timer-label { font-size: 10px; color: #71717a; margin-top: 4px; }
.stats-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.stat-item { display: flex; flex-direction: column; align-items: center; }
.stat-value { font-size: 14px; font-family: 'Courier New', monospace; color: #d4d4d8; }
.stat-label { font-size: 9px; color: #52525b; }

/* Action buttons */
.action-buttons { padding: 16px; max-width: 420px; margin: 0 auto; }
.action-btn {
  width: 100%; border: none; border-radius: 16px; padding: 20px;
  display: flex; align-items: center; gap: 16px; cursor: pointer;
  transition: all 0.3s; margin-bottom: 16px; text-align: right;
}
.action-btn:active { transform: scale(0.98); }
.action-btn .icon-box {
  width: 56px; height: 56px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.action-btn .text-content { flex: 1; }
.action-btn .btn-title { font-size: 16px; font-weight: bold; margin-bottom: 2px; }
.action-btn .btn-desc { font-size: 11px; opacity: 0.6; }
.action-btn .arrow { font-size: 24px; opacity: 0.3; flex-shrink: 0; }

.btn-encourage {
  background: linear-gradient(to left, rgba(6,78,59,0.4), rgba(2,44,34,0.6));
  border: 1px solid rgba(6,95,70,0.3);
}
.btn-encourage .icon-box { background: rgba(6,78,59,0.5); border: 1px solid rgba(4,120,87,0.3); }
.btn-encourage .btn-title { color: #6ee7b7; text-shadow: 0 0 10px rgba(16,185,129,0.4); }
.btn-encourage:hover { box-shadow: 0 0 20px rgba(16,185,129,0.3); }

.btn-sad {
  background: linear-gradient(to left, rgba(30,58,138,0.4), rgba(23,37,84,0.6));
  border: 1px solid rgba(30,64,175,0.3);
}
.btn-sad .icon-box { background: rgba(30,58,138,0.5); border: 1px solid rgba(37,99,235,0.3); }
.btn-sad .btn-title { color: #93c5fd; text-shadow: 0 0 10px rgba(59,130,246,0.4); }
.btn-sad:hover { box-shadow: 0 0 20px rgba(59,130,246,0.3); }

.btn-endtime {
  background: linear-gradient(to left, rgba(127,29,29,0.4), rgba(69,10,10,0.6));
  border: 1px solid rgba(153,27,27,0.3);
}
.btn-endtime .icon-box { background: rgba(127,29,29,0.5); border: 1px solid rgba(220,38,38,0.3); }
.btn-endtime .btn-title { color: #fca5a5; text-shadow: 0 0 10px rgba(239,68,68,0.4); }
.btn-endtime:hover { box-shadow: 0 0 20px rgba(239,68,68,0.3); }

/* Quick action buttons */
.quick-actions { display: flex; gap: 12px; max-width: 420px; margin: 0 auto; padding: 0 16px; }
.quick-btn {
  flex: 1; background: rgba(24,24,27,0.4); border: 1px solid rgba(39,39,42,0.3);
  border-radius: 12px; padding: 12px; color: #a1a1aa; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 13px; transition: all 0.3s;
}
.quick-btn:hover { color: #e4e4e7; background: rgba(24,24,27,0.6); }

/* Footer */
.footer { padding: 16px; text-align: center; margin-top: 32px; }
.footer p { color: #27272a; font-size: 10px; }

/* ===== FULL SCREEN PANELS ===== */
.panel {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 50; background: #000; display: flex; flex-direction: column;
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.panel-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid rgba(39,39,42,0.5);
}
.panel-header .back-btn {
  color: #a1a1aa; background: none; border: none; font-size: 18px;
  cursor: pointer; padding: 4px;
}
.panel-header .close-btn {
  color: #71717a; background: none; border: none; font-size: 18px;
  cursor: pointer; margin-right: auto;
}
.panel-header h2 { font-size: 16px; }
.panel-header .subtitle { font-size: 11px; color: #71717a; }

/* Chat */
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 20px; }

.msg-bubble { max-width: 80%; border-radius: 16px; padding: 12px 16px; margin-bottom: 12px; animation: slideUp 0.3s ease-out; }
.msg-user { margin-right: auto; }
.msg-ai { margin-left: auto; }
.msg-bubble p { font-size: 13px; white-space: pre-wrap; }
.msg-bubble .msg-time { font-size: 9px; color: #52525b; margin-top: 4px; display: block; }

.msg-user-encourage { background: rgba(6,78,59,0.4); border: 1px solid rgba(6,95,70,0.3); }
.msg-ai-default { background: rgba(24,24,27,0.6); border: 1px solid rgba(39,39,42,0.5); }
.msg-user-sad { background: rgba(30,58,138,0.4); border: 1px solid rgba(30,64,175,0.3); }
.msg-user-endtime { background: rgba(127,29,29,0.4); border: 1px solid rgba(153,27,27,0.3); }

.typing-indicator { display: flex; gap: 4px; align-items: center; padding: 8px 0; margin-left: auto; }
.typing-dot {
  width: 8px; height: 8px; background: #71717a; border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out both;
}
.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

.chat-input-area {
  border-top: 1px solid rgba(39,39,42,0.5); padding: 12px;
  background: rgba(0,0,0,0.8);
}
.chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
.chat-input-row textarea {
  flex: 1; background: rgba(24,24,27,0.8); border: 1px solid #27272a;
  border-radius: 12px; padding: 12px 16px; color: #fff; font-size: 13px;
  resize: none; font-family: inherit; min-height: 44px; max-height: 128px;
  outline: none; direction: rtl;
}
.chat-input-row textarea:focus { border-color: #52525b; }
.chat-input-row textarea::placeholder { color: #52525b; }
.send-btn {
  min-width: 44px; min-height: 44px; border: none; border-radius: 12px;
  color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.3s;
}
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn-encourage { background: #059669; }
.send-btn-encourage:hover:not(:disabled) { background: #047857; }
.send-btn-sad { background: #2563eb; }
.send-btn-sad:hover:not(:disabled) { background: #1d4ed8; }
.send-btn-endtime { background: #dc2626; }
.send-btn-endtime:hover:not(:disabled) { background: #b91c1c; }

/* Notes */
.note-input-area { padding: 16px; border-bottom: 1px solid rgba(39,39,42,0.3); }
.note-input-row { display: flex; gap: 8px; }
.note-input-row textarea {
  flex: 1; background: rgba(24,24,27,0.8); border: 1px solid #27272a;
  border-radius: 12px; padding: 12px 16px; color: #fff; font-size: 13px;
  resize: none; font-family: inherit; min-height: 44px; outline: none; direction: rtl;
}
.note-input-row textarea:focus { border-color: #52525b; }
.add-btn {
  min-width: 44px; min-height: 44px; background: #27272a; border: none;
  border-radius: 12px; color: #fff; cursor: pointer; font-size: 20px;
  display: flex; align-items: center; justify-content: center; align-self: flex-end;
}
.add-btn:hover { background: #3f3f46; }

.notes-list { flex: 1; overflow-y: auto; padding: 16px; }
.notes-list::-webkit-scrollbar { width: 4px; }
.notes-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 20px; }

.note-card {
  background: rgba(24,24,27,0.6); border: 1px solid rgba(39,39,42,0.5);
  border-radius: 12px; padding: 16px; margin-bottom: 12px; position: relative;
}
.note-card:hover .note-delete { opacity: 1; }
.note-card p { font-size: 13px; color: #e4e4e7; white-space: pre-wrap; }
.note-card .note-date { font-size: 9px; color: #3f3f46; margin-top: 8px; display: block; }
.note-delete {
  position: absolute; top: 8px; left: 8px; background: none; border: none;
  color: #3f3f46; cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.3s;
}
.note-delete:hover { color: #f87171; }

/* Missions */
.mission-progress { padding: 12px 16px; }
.progress-bar-bg { width: 100%; background: #18181b; border-radius: 999px; height: 8px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(to left, #10b981, #047857); border-radius: 999px; transition: width 0.5s; }
.progress-complete { color: #34d399; font-size: 12px; text-align: center; margin-top: 8px; }

.mission-input-area { padding: 16px; border-bottom: 1px solid rgba(39,39,42,0.3); }
.mission-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
.mission-input-row input {
  flex: 1; background: rgba(24,24,27,0.8); border: 1px solid #27272a;
  border-radius: 12px; padding: 12px 16px; color: #fff; font-size: 13px;
  font-family: inherit; min-height: 44px; outline: none; direction: rtl;
}
.mission-input-row input:focus { border-color: #52525b; }
.generate-btn {
  width: 100%; background: rgba(6,78,59,0.3); border: 1px solid rgba(6,95,70,0.3);
  border-radius: 12px; padding: 10px 16px; color: #6ee7b7; font-size: 13px;
  cursor: pointer; transition: all 0.3s; font-family: inherit;
}
.generate-btn:hover { background: rgba(6,78,59,0.5); }
.generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.missions-list { flex: 1; overflow-y: auto; padding: 16px; }
.missions-list::-webkit-scrollbar { width: 4px; }
.missions-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 20px; }

.mission-card {
  border-radius: 12px; padding: 12px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
  border: 1px solid rgba(39,39,42,0.5); background: rgba(24,24,27,0.6);
  transition: all 0.3s;
}
.mission-card.completed { background: rgba(6,78,59,0.1); border-color: rgba(6,95,70,0.2); }
.mission-check {
  width: 24px; height: 24px; border-radius: 8px; border: 2px solid #3f3f46;
  background: none; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; color: transparent; font-size: 12px;
  transition: all 0.3s;
}
.mission-check.checked { background: #059669; border-color: #10b981; color: #fff; }
.mission-card .mission-text { flex: 1; font-size: 13px; }
.mission-card.completed .mission-text { color: #71717a; text-decoration: line-through; }
.mission-card .mission-delete {
  background: none; border: none; color: #3f3f46; cursor: pointer;
  font-size: 14px; opacity: 0; transition: opacity 0.3s;
}
.mission-card:hover .mission-delete { opacity: 1; }
.mission-card .mission-delete:hover { color: #f87171; }

/* Settings */
.settings-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 50;
  background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center;
  padding: 16px; animation: fadeIn 0.3s ease-out;
}
.settings-card {
  background: #09090b; border: 1px solid #27272a; border-radius: 16px;
  width: 100%; max-width: 420px; overflow: hidden;
}
.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px; border-bottom: 1px solid rgba(39,39,42,0.5);
}
.settings-header h2 { font-size: 16px; }
.settings-close { background: none; border: none; color: #71717a; cursor: pointer; font-size: 18px; }
.settings-body { padding: 16px; }
.settings-item {
  width: 100%; display: flex; align-items: center; gap: 12px;
  padding: 12px; background: rgba(24,24,27,0.6); border: 1px solid rgba(39,39,42,0.5);
  border-radius: 12px; color: #d4d4d8; font-size: 13px; cursor: pointer;
  font-family: inherit; margin-bottom: 8px; transition: all 0.3s;
}
.settings-item:hover { background: rgba(39,39,42,0.5); }
.settings-item.danger { background: rgba(127,29,29,0.2); border-color: rgba(153,27,27,0.3); color: #f87171; }
.settings-item.danger:hover { background: rgba(127,29,29,0.4); }
.volume-range {
  width: 100%; height: 8px; -webkit-appearance: none; background: #27272a;
  border-radius: 8px; outline: none; margin-top: 8px;
}
.volume-range::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #a1a1aa; cursor: pointer; }
.settings-info { text-align: center; padding-top: 16px; border-top: 1px solid rgba(39,39,42,0.3); margin-top: 8px; }
.settings-info p { color: #52525b; font-size: 11px; }

/* Reminders */
.reminder-card {
  background: rgba(24,24,27,0.6); border: 1px solid rgba(39,39,42,0.5);
  border-radius: 12px; padding: 12px; margin-bottom: 8px;
}
.reminder-card .reminder-title { font-size: 13px; font-weight: bold; color: #e4e4e7; }
.reminder-card .reminder-text { font-size: 12px; color: #a1a1aa; margin-top: 4px; line-height: 1.6; }

.ai-reminder-card {
  background: linear-gradient(to bottom right, rgba(127,29,29,0.3), rgba(9,9,11,1));
  border: 1px solid rgba(153,27,27,0.3); border-radius: 16px; padding: 16px; margin-bottom: 16px;
}

.hurtful-btn {
  display: flex; align-items: center; gap: 8px; background: none; border: none;
  color: #f87171; font-size: 13px; font-weight: bold; cursor: pointer;
  font-family: inherit; margin-bottom: 12px;
}
.hurtful-card {
  background: rgba(127,29,29,0.2); border: 1px solid rgba(153,27,27,0.2);
  border-radius: 12px; padding: 12px; margin-bottom: 8px;
}
.hurtful-card p { color: rgba(248,113,113,0.8); font-size: 12px; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 16px; color: #52525b;
}
.empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }
.empty-state p { font-size: 13px; }

.confirm-box {
  background: rgba(127,29,29,0.3); border: 1px solid rgba(153,27,27,0.4);
  border-radius: 12px; padding: 12px; margin-top: 8px;
}
.confirm-box p { color: #fca5a5; font-size: 13px; margin-bottom: 8px; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-btns button {
  flex: 1; border: none; border-radius: 8px; padding: 8px; font-size: 13px;
  cursor: pointer; font-family: inherit; color: #fff;
}
.confirm-yes { background: #b91c1c; }
.confirm-yes:hover { background: #991b1b; }
.confirm-no { background: #27272a; }
.confirm-no:hover { background: #3f3f46; }
</style>

<script>
// ====== CONFIG ======
const API_BASE_URL = 'https://internal-api.z.ai/v1';

// ====== STORAGE ======
const KEYS = {
  chats: 'healing-app-chats',
  notes: 'healing-app-notes',
  missions: 'healing-app-missions',
  settings: 'healing-app-settings',
};

function loadData(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function saveData(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) { console.error(e); }
}

function getSettings() {
  try { return JSON.parse(localStorage.getItem(KEYS.settings)) || { volume: 0.3, muted: true }; }
  catch { return { volume: 0.3, muted: true }; }
}
function saveSettings(s) { saveData(KEYS.settings, s); }

function getNotes() { return loadData(KEYS.notes); }
function addNote(content) {
  const notes = getNotes();
  notes.unshift({ id: 'note-' + Date.now() + '-' + Math.random().toString(36).substr(2,9), content: content, createdAt: Date.now() });
  saveData(KEYS.notes, notes);
  return notes;
}
function deleteNoteById(id) {
  const notes = getNotes().filter(function(n) { return n.id !== id; });
  saveData(KEYS.notes, notes);
  return notes;
}

function getMissions() { return loadData(KEYS.missions); }
function addMission(content) {
  const missions = getMissions();
  missions.unshift({ id: 'mission-' + Date.now() + '-' + Math.random().toString(36).substr(2,9), content: content, completed: false, createdAt: Date.now() });
  saveData(KEYS.missions, missions);
  return missions;
}
function toggleMission(id) {
  const missions = getMissions();
  var m = missions.find(function(x) { return x.id === id; });
  if (m) { m.completed = !m.completed; m.completedAt = m.completed ? Date.now() : undefined; }
  saveData(KEYS.missions, missions);
  return missions;
}
function deleteMissionById(id) {
  const missions = getMissions().filter(function(m) { return m.id !== id; });
  saveData(KEYS.missions, missions);
  return missions;
}

// ====== STATE ======

    drop.className = 'raindrop';
    drop.style.left = (Math.random() * 100) + '%';

    drop.style.animationDelay = (Math.random() * 3) + 's';

    container.appendChild(drop);
  }
}

// ====== TIMER ======
function calculateElapsed() {
  var now = new Date();
  var diff = now.getTime() - TARGET_DATE.getTime();
  if (diff < 0) return { years:0, months:0, days:0, hours:0, minutes:0, seconds:0, totalDays:0, totalHours:0, totalMinutes:0, totalSeconds:0 };

  var totalSeconds = Math.floor(diff / 1000);
  var totalMinutes = Math.floor(totalSeconds / 60);
  var totalHours = Math.floor(totalMinutes / 60);
  var totalDays = Math.floor(totalHours / 24);

  var years = now.getFullYear() - TARGET_DATE.getFullYear();
  var months = now.getMonth() - TARGET_DATE.getMonth();
  var days = now.getDate() - TARGET_DATE.getDate();
  var hours = now.getHours() - TARGET_DATE.getHours();
  var minutes = now.getMinutes() - TARGET_DATE.getMinutes();
  var seconds = now.getSeconds() - TARGET_DATE.getSeconds();

  if (seconds < 0) { seconds += 60; minutes--; }
  if (minutes < 0) { minutes += 60; hours--; }
  if (hours < 0) { hours += 24; days--; }
  if (days < 0) { var prev = new Date(now.getFullYear(), now.getMonth(), 0); days += prev.getDate(); months--; }
  if (months < 0) { months += 12; years--; }

  return { years: years, months: months, days: days, hours: hours, minutes: minutes, seconds: seconds, totalDays: totalDays, totalHours: totalHours, totalMinutes: totalMinutes, totalSeconds: totalSeconds };
}

function callAI(message, mode, history) {
  var sysPrompt = systemPrompts[mode] || systemPrompts.sad;
  var messages = [
    { role: 'system', content: sysPrompt }
  ];
  if (Array.isArray(history)) {
    var recent = history.slice(-10);
    for (var i = 0; i < recent.length; i++) {
      messages.push({ role: recent[i].role, content: recent[i].content });
    }
  }
  messages.push({ role: 'user', content: message });

  return fetch(API_BASE_URL + '/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + API_KEY,
      'X-Z-AI-From': 'Z',
      'X-Chat-Id': CHAT_ID,
      'X-User-Id': USER_ID,
      'X-Token': API_TOKEN
    },
    body: JSON.stringify({
      messages: messages,
      temperature: 0.8,
      max_tokens: 300,
      thinking: { type: 'disabled' }
    })
  }).then(function(response) {
    if (!response.ok) {
      return response.text().then(function(errText) {
        console.error('API error:', response.status, errText);
        throw new Error('API failed');
      });
    }
    return response.json();
  }).then(function(data) {
    return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content)
      || data.content || data.text || 'مش قادر أرد دلوقتي، حاول تاني 🙏';
  }).catch(function(error) {
    console.error('Chat error:', error);
    return 'حصلت مشكلة تقنية. حاول تاني 🙏';
  });
}

// ====== MUSIC ======
function initAudio() {
  if (musicInitialized) return;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var gn = ctx.createGain();
    gn.connect(ctx.destination);
    var settings = getSettings();
    gn.gain.setValueAtTime(settings.muted ? 0 : settings.volume, ctx.currentTime);
    audioContext = ctx;
    gainNode = gn;
    musicInitialized = true;
    createAmbientSound(currentChatMode);
  } catch(e) { console.error('Audio init error:', e); }
}

function createAmbientSound(mode) {
  if (!audioContext || !gainNode) return;
  for (var i = 0; i < oscillators.length; i++) {
    try { oscillators[i].stop(); } catch(e) {}
  }
  oscillators = [];

  var ctx = audioContext;
  var master = gainNode;
  var m = mode || 'sad';

  var configs = {
    encourage: { freqs: [220, 277.18, 329.63, 440], type: 'sine', detune: 5 },
    sad: { freqs: [196, 233.08, 293.66, 392], type: 'sine', detune: 3 },
    endtime: { freqs: [174.61, 207.65, 261.63, 349.23], type: 'triangle', detune: 7 }
  };
  var config = configs[m];

  for (var i = 0; i < config.freqs.length; i++) {
    var freq = config.freqs[i];
    var osc = ctx.createOscillator();
    var oscGain = ctx.createGain();
    osc.type = config.type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.detune.setValueAtTime(config.detune * (i + 1), ctx.currentTime);

    var lfo = ctx.createOscillator();
    var lfoGain = ctx.createGain();
    lfo.type = 'sine';
    lfo.frequency.setValueAtTime(0.1 + i * 0.05, ctx.currentTime);
    lfoGain.gain.setValueAtTime(2 + i, ctx.currentTime);
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start();

    oscGain.gain.setValueAtTime(0, ctx.currentTime);
    oscGain.gain.linearRampToValueAtTime(0.06 / (i + 1), ctx.currentTime + 3);

    osc.connect(oscGain);
    oscGain.connect(master);
    osc.start();
    oscillators.push(osc, lfo);
  }

  // Noise layer
  var bufferSize = ctx.sampleRate * 2;
  var noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  var output = noiseBuffer.getChannelData(0);
  for (var i = 0; i < bufferSize; i++) { output[i] = (Math.random() * 2 - 1) * 0.003; }
  var noise = ctx.createBufferSource();
  noise.buffer = noiseBuffer;
  noise.loop = true;
  var noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0.15, ctx.currentTime);
  var filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(400, ctx.currentTime);
  noise.connect(filter);
  filter.connect(noiseGain);
  noiseGain.connect(master);
  noise.start();
  oscillators.push(noise);
}

function toggleMute() {
  if (!musicInitialized) {
    initAudio();
    var s = Object.assign({}, getSettings(), { muted: false });
    saveSettings(s);
    renderApp();
    return;
  }
  var s = Object.assign({}, getSettings(), { muted: !getSettings().muted });
  saveSettings(s);
  if (gainNode && audioContext) {
    gainNode.gain.setValueAtTime(s.muted ? 0 : s.volume, audioContext.currentTime);
  }
  renderApp();
}

function setVolume(v) {
  var s = Object.assign({}, getSettings(), { volume: v, muted: v === 0 });
  saveSettings(s);
  if (gainNode && audioContext && !s.muted) {
    gainNode.gain.setValueAtTime(v, audioContext.currentTime);
  }
  renderApp();
}

  chatMessages = [{ id: 'ai-init-' + Date.now(), role: 'assistant', content: initialMessages[mode], timestamp: Date.now() }];

  scrollToBottom();
}

function scrollToBottom() {
  setTimeout(function() {
    var el = document.getElementById('chatMessages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 50);
}

function sendMessage() {
  var input = document.getElementById('chatInput');
  if (!input) return;
  var text = input.value.trim();
  if (!text || sendingMessage) return;

  sendingMessage = true;
  chatMessages.push({ id: 'user-' + Date.now(), role: 'user', content: text, timestamp: Date.now() });
  input.value = '';
  renderApp();

  var msgsEl = document.getElementById('chatMessages');
  if (msgsEl) {
    var typingDiv = document.createElement('div');
    typingDiv.className = 'typing-indicator';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    msgsEl.appendChild(typingDiv);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  var history = chatMessages.map(function(m) { return { role: m.role, content: m.content }; });
  callAI(text, currentChatMode, history).then(function(aiResponse) {
    var ti = document.getElementById('typingIndicator');
    if (ti) ti.remove();

    chatMessages.push({ id: 'ai-' + Date.now(), role: 'assistant', content: aiResponse, timestamp: Date.now() });
    sendingMessage = false;
    renderApp();

    try {
      var chats = loadData(KEYS.chats);
      chats.unshift({ id: chatSessionId, mode: currentChatMode, messages: chatMessages, createdAt: Date.now(), updatedAt: Date.now() });
      if (chats.length > 50) chats.length = 50;
      saveData(KEYS.chats, chats);
    } catch(e) { console.error(e); }
  });
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

    '<div class="settings-card">' +
      '<div class="settings-header">' +
        '<div style="display:flex;align-items:center;gap:8px;"><span>\u2699\uFE0F</span><h2>\u0627\u0644\u0625\u0639\u062F\u0627\u062F\u0627\u062A</h2></div>' +
        '<button class="settings-close" onclick="goHome()">\u2715</button>' +
      '</div>' +
      '<div class="settings-body">' +
        '<div style="margin-bottom:16px;">' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">' +
            '<span>\uD83D\uDD0A</span><span style="font-size:13px;color:#d4d4d8;">\u0645\u0633\u062A\u0648\u0649 \u0627\u0644\u0635\u0648\u062A</span>' +
          '</div>' +
          '<input type="range" class="volume-range" min="0" max="1" step="0.01" value="' + settings.volume + '" onchange="setVolume(parseFloat(this.value))">' +
        '</div>' +
        '<button class="settings-item" onclick="exportChats()">\uD83D\uDCE5 \u062A\u0635\u062F\u064A\u0631 \u0633\u062C\u0644 \u0627\u0644\u0645\u062D\u0627\u062F\u062B\u0627\u062A</button>';

  if (!showConfirmClear) {
    html += '<button class="settings-item danger" onclick="showConfirmClear=true;renderApp()">\uD83D\uDDD1 \u0645\u0633\u062D \u0643\u0644 \u0627\u0644\u0645\u062D\u0627\u062F\u062B\u0627\u062A</button>';
  } else {
    html += '<div class="confirm-box"><p>\u0645\u062A\u0623\u0643\u062F\u061F \u062F\u0647 \u0645\u0634 \u0647\u064A\u062A\u0631\u062C\u0639!</p>' +
      '<div class="confirm-btns">' +
        '<button class="confirm-yes" onclick="clearChats()">\u0623\u064A\u0647\u060C \u0627\u0645\u0633\u062D</button>' +
        '<button class="confirm-no" onclick="showConfirmClear=false;renderApp()">\u0644\u0627\u060C \u062E\u0644\u0627\u0635</button>' +
      '</div></div>';
  }

  html += '<div class="settings-info">' +
    '<p>\u0645\u0631\u0651 \u0645\u0646 \u0627\u0644\u0648\u0642\u062A v2.0</p>' +
    '<p style="margin-top:4px;">\u0623\u0646\u062A \u0623\u0642\u0648\u0649 \u0645\u0645\u0627 \u062A\u062A\u062E\u064A\u0644 \uD83D\uDCAA</p>' +
  '</div></div></div></div>';
  app.innerHTML = html;
}

function exportChats() {
  var data = JSON.stringify(loadData(KEYS.chats), null, 2);
  var blob = new Blob([data], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'healing-app-backup-' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function clearChats() {
  localStorage.removeItem(KEYS.chats);
  showConfirmClear = false;
  renderApp();
}

// ====== NAVIGATION ======
function goHome() {
  currentView = 'home';
  if (musicInitialized) { createAmbientSound(null); }
  renderApp();
}

// ====== INIT ======
createRain();
renderApp();

// Update timer every second
setInterval(function() {
  if (currentView === 'home') {
    var elapsed = calculateElapsed();
    var boxes = document.querySelectorAll('.timer-value span');
    if (boxes.length === 6) {
      boxes[0].textContent = pad2(elapsed.years);
      boxes[1].textContent = pad2(elapsed.months);
      boxes[2].textContent = pad2(elapsed.days);
      boxes[3].textContent = pad2(elapsed.hours);
      boxes[4].textContent = pad2(elapsed.minutes);
      boxes[5].textContent = pad2(elapsed.seconds);
    }
    var stats = document.querySelectorAll('.stat-value');
    if (stats.length === 3) {
      stats[0].textContent = elapsed.totalDays.toLocaleString('ar-EG');
      stats[1].textContent = elapsed.totalHours.toLocaleString('ar-EG');
      stats[2].textContent = elapsed.totalMinutes.toLocaleString('ar-EG');
    }
  }
}, 1000);

// Background rotation
var bgIndex = 1;
setInterval(function() {
  bgIndex = (bgIndex % 3) + 1;
  var bg = document.getElementById('bgImage');
  if (bg) { bg.style.backgroundImage = 'url(bg' + bgIndex + '.png)'; }
}, 15000);
</script>
</body>
</html>
