name: healing_timer_app
description: "Healing Timer - A real native app with YouTube Music, AI Chat, and more"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  youtube_explode_dart: ^2.3.5
  just_audio: ^0.9.39
  audio_service: ^0.18.15
  http: ^1.2.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  flutter_local_notifications: ^18.0.1
  provider: ^6.1.2
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
